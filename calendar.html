<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>家庭行事曆</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, sans-serif; background: #f5f5f5; color: #333; }

    .header {
      background: #06C755;
      color: white;
      padding: 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .header h1 { font-size: 18px; font-weight: bold; }
    .nav-btn {
      background: rgba(255,255,255,0.3);
      border: none;
      color: white;
      width: 32px; height: 32px;
      border-radius: 50%;
      font-size: 18px;
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .month-label { font-size: 16px; font-weight: bold; }

    .weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: #fff;
      border-bottom: 1px solid #eee;
    }
    .weekdays div {
      text-align: center;
      padding: 8px 0;
      font-size: 12px;
      color: #888;
      font-weight: 600;
    }
    .weekdays div:first-child { color: #e74c3c; }
    .weekdays div:last-child { color: #3498db; }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: #fff;
      gap: 1px;
      background-color: #eee;
    }
    .day-cell {
      background: #fff;
      min-height: 64px;
      padding: 4px;
    }
    .day-num {
      font-size: 13px;
      font-weight: 500;
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
      margin-bottom: 2px;
    }
    .day-cell.today .day-num {
      background: #06C755;
      color: white;
    }
    .day-cell.sun .day-num { color: #e74c3c; }
    .day-cell.sat .day-num { color: #3498db; }
    .day-cell.other-month { background: #fafafa; }
    .day-cell.other-month .day-num { color: #ccc; }

    .event-dot {
      font-size: 10px;
      background: #06C755;
      color: white;
      border-radius: 3px;
      padding: 1px 4px;
      margin-bottom: 1px;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      max-width: 100%;
      cursor: pointer;
    }
    .event-dot.personal { background: #e74c3c; }
    .event-dot.other { background: #9b59b6; }

    .events-section {
      margin: 12px;
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08);
    }
    .events-section h2 {
      font-size: 14px;
      padding: 12px 16px;
      background: #f9f9f9;
      border-bottom: 1px solid #eee;
      color: #555;
    }
    .event-item {
      display: flex;
      align-items: center;
      padding: 10px 16px;
      border-bottom: 1px solid #f0f0f0;
    }
    .event-item:last-child { border-bottom: none; }
    .event-date-badge {
      background: #06C755;
      color: white;
      border-radius: 8px;
      padding: 4px 8px;
      font-size: 12px;
      font-weight: bold;
      min-width: 48px;
      text-align: center;
      margin-right: 12px;
      flex-shrink: 0;
    }
    .event-info { flex: 1; }
    .event-title { font-size: 14px; font-weight: 500; }
    .event-by { font-size: 11px; color: #aaa; margin-top: 2px; }
    .no-events { text-align: center; padding: 24px; color: #aaa; font-size: 14px; }
    .delete-btn {
      background: none; border: none; color: #ccc;
      font-size: 18px; cursor: pointer; padding: 4px 8px;
      flex-shrink: 0; line-height: 1;
    }
    .delete-btn:active { color: #e74c3c; }
    .saving-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.4); display: flex;
      align-items: center; justify-content: center;
      z-index: 999; display: none;
    }
    .saving-box {
      background: white; border-radius: 12px;
      padding: 24px 32px; text-align: center; font-size: 15px;
    }
    .modal-overlay {
      position: fixed; top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5); display: none;
      align-items: flex-end; justify-content: center; z-index: 998;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white; border-radius: 16px 16px 0 0;
      padding: 24px; width: 100%; max-width: 480px;
    }
    .modal h3 { font-size: 16px; font-weight: bold; margin-bottom: 16px; }
    .form-group { margin-bottom: 14px; }
    .form-group label { font-size: 13px; color: #666; display: block; margin-bottom: 4px; }
    .form-group input, .form-group select {
      width: 100%; border: 1px solid #ddd; border-radius: 8px;
      padding: 10px 12px; font-size: 15px; outline: none;
    }
    .form-group input:focus, .form-group select:focus { border-color: #06C755; }
    .modal-btns { display: flex; gap: 8px; margin-top: 16px; }
    .btn-cancel {
      flex: 1; padding: 12px; border: 1px solid #ddd; border-radius: 8px;
      background: white; font-size: 15px; cursor: pointer;
    }
    .btn-save {
      flex: 2; padding: 12px; border: none; border-radius: 8px;
      background: #06C755; color: white; font-size: 15px;
      font-weight: bold; cursor: pointer;
    }
    .add-btn {
      background: rgba(255,255,255,0.3); border: none; color: white;
      width: 32px; height: 32px; border-radius: 50%; font-size: 22px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      line-height: 1;
    }
    .edit-btn {
      background: none; border: none; color: #ccc;
      font-size: 14px; cursor: pointer; padding: 4px 6px; flex-shrink: 0;
    }
  </style>
</head>
<body>

<div class="header">
  <button class="nav-btn" onclick="changeMonth(-1)">‹</button>
  <div>
    <div class="month-label" id="monthLabel"></div>
    <div style="font-size:11px; opacity:0.8; text-align:center;">家庭行事曆 🏠</div>
  </div>
  <button class="nav-btn" onclick="changeMonth(1)">›</button>
  <button class="add-btn" onclick="openModal()">+</button>
</div>

<div class="weekdays">
  <div>日</div><div>一</div><div>二</div><div>三</div><div>四</div><div>五</div><div>六</div>
</div>
<div class="calendar-grid" id="calendarGrid"></div>

<div class="modal-overlay" id="modalOverlay" onclick="closeModalOnBg(event)">
  <div class="modal">
    <h3 id="modalTitle">新增行程</h3>
    <div class="form-group">
      <label>日期</label>
      <input type="date" id="formDate">
    </div>
    <div class="form-group">
      <label>行程內容</label>
      <input type="text" id="formTitle" placeholder="例：看牙醫、回外婆家">
    </div>
    <div class="form-group">
      <label>誰的行程</label>
      <select id="formBy">
        <option value="爸爸">爸爸</option>
        <option value="媽媽">媽媽</option>
        <option value="全家">全家</option>
        <option value="小跳跳">小跳跳</option>
      </select>
    </div>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-save" onclick="saveEvent()">儲存</button>
    </div>
  </div>
</div>

<div class="saving-overlay" id="savingOverlay">
  <div class="saving-box">儲存中...</div>
</div>

<div class="events-section">
  <h2 id="upcomingLabel">本月行程</h2>
  <div id="eventsList"></div>
</div>

<script>
  let currentDate = new Date();
  let allEvents = [];

  const REPO = 'tesngray-hub/my-line-bot';
  const EVENTS_PATH = 'events.json';
  const GH_TOKEN = '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';
  const EVENTS_URL = 'https://raw.githubusercontent.com/' + REPO + '/main/' + EVENTS_PATH;

  async function loadEvents() {
    try {
      const r = await fetch(EVENTS_URL + '?t=' + Date.now());
      const data = await r.json();
      allEvents = data.events || [];
    } catch(e) {
      allEvents = [];
    }
    render();
  }

  function changeMonth(dir) {
    currentDate = new Date(currentDate.getFullYear(), currentDate.getMonth() + dir, 1);
    render();
  }

  function render() {
    const year = currentDate.getFullYear();
    const month = currentDate.getMonth();
    const today = new Date();

    document.getElementById('monthLabel').textContent = `${year}年 ${month + 1}月`;

    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const daysInPrevMonth = new Date(year, month, 0).getDate();

    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';

    const monthEvents = {};
    allEvents.forEach(e => {
      const d = new Date(e.date + 'T00:00:00');
      if (d.getFullYear() === year && d.getMonth() === month) {
        const key = d.getDate();
        if (!monthEvents[key]) monthEvents[key] = [];
        monthEvents[key].push(e);
      }
    });

    // prev month days
    for (let i = firstDay - 1; i >= 0; i--) {
      const cell = createCell(daysInPrevMonth - i, 'other-month', (firstDay - 1 - i) % 7);
      grid.appendChild(cell);
    }
    // current month days
    for (let d = 1; d <= daysInMonth; d++) {
      const dow = (firstDay + d - 1) % 7;
      const isToday = d === today.getDate() && month === today.getMonth() && year === today.getFullYear();
      const cell = createCell(d, isToday ? 'today' : '', dow, monthEvents[d] || []);
      grid.appendChild(cell);
    }
    // next month days
    const total = Math.ceil((firstDay + daysInMonth) / 7) * 7;
    const remaining = total - firstDay - daysInMonth;
    for (let d = 1; d <= remaining; d++) {
      const dow = (firstDay + daysInMonth + d - 1) % 7;
      const cell = createCell(d, 'other-month', dow);
      grid.appendChild(cell);
    }

    // events list
    const monthList = allEvents
      .filter(e => { const d = new Date(e.date + 'T00:00:00'); return d.getFullYear() === year && d.getMonth() === month; })
      .sort((a, b) => a.date.localeCompare(b.date));

    const list = document.getElementById('eventsList');
    document.getElementById('upcomingLabel').textContent = `${month + 1}月行程`;
    if (monthList.length === 0) {
      list.innerHTML = '<div class="no-events">這個月還沒有行程 📭</div>';
    } else {
      list.innerHTML = '';
      monthList.forEach((e, idx) => {
        const d = new Date(e.date + 'T00:00:00');
        const label = `${d.getMonth()+1}/${d.getDate()}`;
        const globalIdx = allEvents.indexOf(e);
        const item = document.createElement('div');
        item.className = 'event-item';
        item.innerHTML = `
          <div class="event-date-badge">${label}</div>
          <div class="event-info">
            <div class="event-title">${e.title}</div>
            <div class="event-by">由 ${e.by || '小跳跳'} 記錄</div>
          </div>
          <button class="edit-btn" onclick="editEvent(${globalIdx})">✏️</button>
          <button class="delete-btn" onclick="deleteEvent(${globalIdx})">✕</button>`;
        list.appendChild(item);
      });
    }
  }

  function createCell(day, cls, dow, events) {
    const cell = document.createElement('div');
    cell.className = 'day-cell' + (cls ? ' ' + cls : '') + (dow === 0 ? ' sun' : '') + (dow === 6 ? ' sat' : '');
    const num = document.createElement('div');
    num.className = 'day-num';
    num.textContent = day;
    cell.appendChild(num);
    if (events) {
      events.slice(0, 2).forEach(e => {
        const dot = document.createElement('div');
        dot.className = 'event-dot';
        dot.textContent = e.title;
        cell.appendChild(dot);
      });
      if (events.length > 2) {
        const more = document.createElement('div');
        more.style = 'font-size:10px; color:#aaa; padding-left:2px;';
        more.textContent = `+${events.length - 2}`;
        cell.appendChild(more);
      }
    }
    return cell;
  }

  let editingIdx = -1;

  function openModal(idx = -1) {
    editingIdx = idx;
    const today = new Date().toISOString().split('T')[0];
    if (idx >= 0) {
      document.getElementById('modalTitle').textContent = '編輯行程';
      document.getElementById('formDate').value = allEvents[idx].date;
      document.getElementById('formTitle').value = allEvents[idx].title;
      document.getElementById('formBy').value = allEvents[idx].by || '爸爸';
    } else {
      document.getElementById('modalTitle').textContent = '新增行程';
      document.getElementById('formDate').value = today;
      document.getElementById('formTitle').value = '';
      document.getElementById('formBy').value = '全家';
    }
    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
  }

  function closeModalOnBg(e) {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  }

  async function saveEvent() {
    const date = document.getElementById('formDate').value;
    const title = document.getElementById('formTitle').value.trim();
    const by = document.getElementById('formBy').value;
    if (!date || !title) { alert('請填寫日期和行程內容'); return; }

    closeModal();
    const overlay = document.getElementById('savingOverlay');
    overlay.style.display = 'flex';

    try {
      const meta = await fetch(`https://api.github.com/repos/${REPO}/contents/${EVENTS_PATH}`, {
        headers: { Authorization: 'token ' + GH_TOKEN }
      });
      const metaJson = await meta.json();
      const sha = metaJson.sha;

      const newEvents = [...allEvents];
      if (editingIdx >= 0) {
        newEvents[editingIdx] = { date, title, by };
      } else {
        newEvents.push({ date, title, by });
        newEvents.sort((a, b) => a.date.localeCompare(b.date));
      }

      const newContent = btoa(unescape(encodeURIComponent(JSON.stringify({ events: newEvents }, null, 2) + '\n')));
      await fetch(`https://api.github.com/repos/${REPO}/contents/${EVENTS_PATH}`, {
        method: 'PUT',
        headers: { Authorization: 'token ' + GH_TOKEN, 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: editingIdx >= 0 ? 'Edit event' : 'Add event', content: newContent, sha })
      });

      allEvents = newEvents;
      render();
    } catch(e) {
      alert('儲存失敗，請再試一次');
    } finally {
      overlay.style.display = 'none';
    }
  }

  async function editEvent(idx) {
    openModal(idx);
  }

  async function deleteEvent(idx) {
    if (!confirm(`刪除「${allEvents[idx].title}」？`)) return;

    const overlay = document.getElementById('savingOverlay');
    overlay.style.display = 'flex';

    try {
      // get current SHA
      const meta = await fetch(`https://api.github.com/repos/${REPO}/contents/${EVENTS_PATH}`, {
        headers: { Authorization: 'token ' + GH_TOKEN }
      });
      const metaJson = await meta.json();
      const sha = metaJson.sha;

      // remove event
      const newEvents = allEvents.filter((_, i) => i !== idx);
      const newContent = btoa(unescape(encodeURIComponent(JSON.stringify({ events: newEvents }, null, 2) + '\n')));

      await fetch(`https://api.github.com/repos/${REPO}/contents/${EVENTS_PATH}`, {
        method: 'PUT',
        headers: { Authorization: 'token ' + GH_TOKEN, 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: 'Delete event', content: newContent, sha })
      });

      allEvents = newEvents;
      render();
    } catch(e) {
      alert('刪除失敗，請再試一次');
    } finally {
      overlay.style.display = 'none';
    }
  }

  loadEvents();
</script>
</body>
</html>
